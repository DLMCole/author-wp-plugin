name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '7.4', '8.0', '8.1', '8.2', '8.3' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
          coverage: none

      - name: Syntax check (php -l)
        run: |
          find . \
            -path ./includes/lib -prune -o \
            -path ./vendor -prune -o \
            -name '*.php' -print0 \
          | xargs -0 -n1 php -l

      - name: Install dev dependencies
        if: matrix.php == '8.2'
        run: composer install --no-progress --prefer-dist

      - name: PHP CodeSniffer (WordPress Coding Standards)
        if: matrix.php == '8.2'
        run: composer run lint
